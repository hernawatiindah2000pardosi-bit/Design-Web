<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan For Kelipatan</title>
</head>
<body>
    <script>
        // counter += 3 artinya nilai counter akan ditambah 3 pada setiap putaran
        // Akan mencetak 0, 3, 6, 9, ... hingga 48
        for(let counter = 0; counter < 50; counter += 3) {
            document.write("<p>Perulangan ke-" + counter + "</p>");
        }
    </script>
</body>
</html>
