<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan For Normal</title>
</head>
<body>
    <script>

        // (nilai awal; batas akhir kondisi; penambahan/increment)
        // i++ artinya nilai variabel 'i' akan ditambah 1 terus menerus
        for(let i = 0; i < 10; i++) {
            document.write("<p>Perulangan ke-" + i + "</p>");
        }
    
    </script>
</body>
</html>
</body>
</html>
