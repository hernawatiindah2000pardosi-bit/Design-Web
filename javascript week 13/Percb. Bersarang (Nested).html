<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percabangan Bersarang</title>
</head>
<body>
    <script>
        var username = prompt("Username: ");
        var password = prompt("Password: ");

        // Cek username terlebih dahulu
        if(username == "polmed") {
            // Jika username benar, baru cek password
            if(password == "admin") {
                document.write("<h2> Selamat datang bos!</h2>");
            } else {
                document.write("<p>Password salah, coba lagi!</p>");
            }
        } else {
            // Jika username dari awal sudah salah
            document.write("<p>Anda tidak terdaftar!</p>");
        }
    </script>
</body>
</html>
