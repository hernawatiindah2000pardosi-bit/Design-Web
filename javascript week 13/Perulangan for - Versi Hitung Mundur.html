<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan For Mundur</title>
</head>
<body>
    <script>
        // Dimulai dari 10. Syarat loop berjalan: nilai harus lebih besar dari 0
        // counter-- artinya nilainya akan dikurangi 1 setiap putaran
        for(let counter = 10; counter > 0; counter--) {
            document.write("<p>Perulangan ke " + counter + "</p>");
        }
    </script>
</body>
</html>
