<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan Do While</title>
</head>
<body>
    <script>
        var ulangi = confirm("Apakah anda mau mengulang?");
        var counter = 0;

        // do { ... } akan selalu dieksekusi duluan tanpa mengecek syarat apapun
        do {
            counter++;
            ulangi = confirm("Apakah anda mau mengulang?");
        // Pengecekan kondisi diletakkan di akhir (while)
        } while(ulangi); 

        document.write("Perulangan sudah dilakuakn sebanyak " + counter + " kali");
    </script>
</body>
</html>
