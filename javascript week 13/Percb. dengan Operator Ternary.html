<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percabangan Ternary</title>
</head>
<body>
    <script>
        var jwb = prompt("Apakah Jakarta ibu kota indonesia?");
        
        // toUpperCase() mengubah inputan user menjadi huruf besar semua agar mudah dicocokkan
        // Format Ternary: (Kondisi) ? "Nilai jika Benar" : "Nilai jika Salah"
        var jawaban = (jwb.toUpperCase() == "IYA") ? "Benar" : "Salah";
        
        document.write(`Jawaban anda: <b>${jawaban}</b>`);
    </script>
</body>
</html>
