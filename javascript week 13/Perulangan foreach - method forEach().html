<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan Method Foreach</title>
</head>
<body>
    <script>
        // Array berisi nama-nama hari
        var days = ["Senin", "Selasa", "Rabu", "Kamis", "Jum'at", "Sabtu", "Minggu"];
        
        // Parameter 'day' akan otomatis mewakili setiap nama hari satu per satu dari dalam array
        days.forEach((day) => {
            document.write("<p>" + day + "</p>");
        });
    </script>
</body>
</html>
