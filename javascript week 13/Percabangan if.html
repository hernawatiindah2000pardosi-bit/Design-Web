<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percabangan If</title>
</head>
<body>
    <script>
        // prompt() memunculkan pop-up inputan. Angka 0 adalah nilai default awal.
        var totalBelanja = prompt("Total belanja?", 0);

        // Jika input totalBelanja lebih besar dari 100000, maka jalankan blok di dalam { }
        if(totalBelanja > 100000) {
            document.write("<h2>Selamat Anda dapat hadiah</h2>");
        }

        // Teks ini akan selalu dicetak terlepas dari kondisi if terpenuhi atau tidak
        document.write("<p>Terimakasih sudah berbelanja di toko kami</p>");
    </script>
</body>
</html>
