<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan Repeat</title>
</head>
<body>
    <script>
        // Mengulang kalimat ini sebanyak 100 kali secara otomatis tanpa blok 'for'
        document.write("Ulangi kalimat ini! <br>".repeat(100));
    </script>
</body>
</html>
