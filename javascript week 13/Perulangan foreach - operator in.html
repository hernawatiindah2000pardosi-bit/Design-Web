<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan Foreach In</title>
</head>
<body>
    <script>
        // Array berisi nama-nama bahasa pemrograman
        var languages = ["Javascript", "HTML", "CSS", "Typescript"];
        
        // Menggunakan kata kunci 'in' untuk mengambil angka indeks (0, 1, 2, 3)
        for(i in languages) {
            // Mencetak indeks dan nilainya
            document.write(i + ". " + languages[i] + "<br/>");
        }
    </script>
</body>
</html>
