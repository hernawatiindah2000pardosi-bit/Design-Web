<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <font size="1">Ini adalah font 1</font><br> <!--size atribut untuk ukuran-->
    <font size="2">Ini adalah font 2</font><br>
    <font size="3">Ini adalah font 3</font><br>
    <font size="4">Ini adalah font 4</font><br>
    <font size="5">Ini adalah font 5</font><br>
    <font size="6">Ini adalah font 6</font><br>
    <font size="7">Ini adalah font 7</font><br>
    Ini adalah font default 
    <hr>  <!--membuat garis horizontal-->
    <font face="arial" size="5" color="pink">Ini tulisan Arial</font><br>  <!--face untuk atribut bentuk tulisan-->
    <font face="algerian" color="red">Ini tulisan Algerian</font><br>
    <font face="comic sans MS" color="blue">Ini tulisan Comic sans MS</font><br>
    <font face="courier new">Ini tulisan Courier new</font><br>
    <font face="chalkboard"color="green">Ini tulisan Chalkboard</font><br>
    <hr>
    <font color="red"> Hallo </font> <!--color unutuk atribut warna-->
</body>
</html>
