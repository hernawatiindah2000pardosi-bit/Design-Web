<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Confirm</title>
</head>
<body>
    <script>
        var setuju=confirm("Apakah Anda Setuju mengunjungi website ini ?");
        if (setuju){
            window.location="https://www.dpr.go.id/";
        }
        else{
            document.write("Ok, Masih Berada Pada Halaman Awal")
        }
    </script>
    
</body>
</html>
