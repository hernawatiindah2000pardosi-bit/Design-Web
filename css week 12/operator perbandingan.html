<!DOCTYPE html>
<html>
<head>
    <title>Operator Perbandingan</title>
</head>
<body>
    <script>
        var a = 25;
        var b = 15;

        // sama dengan (== mengecek apakah nilai a sama dengan b)
        var hasil = a == b;
        document.write(a + " == " + b + " = " + hasil + "<br/>");

        // lebih besar 
        var hasil = a > b;
        document.write(a + " > " + b + " = " + hasil + "<br/>");

        // lebih besar samadengan
        var hasil = a >= b;
        document.write(a + " >= " + b + " = " + hasil + "<br/>");

        // lebih kecil 
        var hasil = a < b;
        document.write(a + " < " + b + " = " + hasil + "<br/>");

        // lebih kecil samadengan 
        var hasil = a <= b;
        document.write(a + " <= " + b + " = " + hasil + "<br/>");

        // tidak samadengan (!= mengecek apakah nilainya berbeda)
        var hasil = a != b;
        document.write(a + " != " + b + " = " + hasil + "<br/>");
    </script>
</body>
</html>
