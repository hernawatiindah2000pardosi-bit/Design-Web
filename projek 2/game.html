<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Competence: Industry Level</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="game-navbar">
        <div class="nav-logo">🎓 English4Work</div>
        <ul class="nav-menu">
            <li><a href="materials.html">Course Materials</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="game.html" style="color: #f1c40f; font-weight: bold;">🎮 Mini Game</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <div class="game-container">
            
            <!-- TOP STATS: Lives & XP -->
            <div class="stats-bar">
                <div class="lives">Lives: <span id="lives-text">❤️❤️❤️</span></div>
                <div class="score">XP: <span id="score-text">0</span></div>
            </div>

            <!-- QUESTION AREA -->
            <div class="question-box">
                <h2 id="question-text">The question will appear here...</h2>
            </div>

            <!-- OPTIONS GRID -->
            <div class="options-grid" id="options-container">
                <!-- Options will be generated by JavaScript -->
            </div>

            <!-- NEXT BUTTON -->
            <button id="btn-next" class="btn-next" style="display: none;" onclick="nextQuestion()">Next Question ➔</button>

            <!-- GAME OVER SCREEN -->
            <div id="game-over-screen" class="game-over-screen" style="display: none;">
                <h2>Assessment Completed! 🎯</h2>
                <p>Total XP Earned: <span id="final-score">0</span></p>
                <button onclick="restartGame()" class="btn-restart">Play Again 🔄</button>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="game-footer">
        <p>&copy; 2026 Interactive English Learning. Enhancing employees' English competence for the global industry.</p>
    </footer>

    <!-- LINK TO LOGIC -->
    <script src="script.js"></script>

</body>
</html>
