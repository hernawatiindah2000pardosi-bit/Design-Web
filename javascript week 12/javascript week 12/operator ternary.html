<!DOCTYPE html>
<html>
<head>
    <title>Operator Ternary</title>
</head>
<body>
    <script>
        // confirm() akan memunculkan pop-up dengan tombol 'OK' dan 'Cancel'
        var pertanyaan = confirm("Apakah kamu berumur diatas 18 tahun?")

        // Sintaks Ternary: kondisi ? "nilai jika true" : "nilai jika false"
        var hasil = pertanyaan ? "Selamat datang di website ini" : "Kamu tidak boleh dmasuk di website ini";
        
        document.write(hasil);
    </script>
</body>
</html>
