<!DOCTYPE html>
<html lang="en">
<head>
    <title>Variabel</title>
</head>
<body>
    <!-- Tag script digunakan untuk menyisipkan kode JavaScript ke dalam HTML -->
    <script>
        // Membuat variabel dengan kata kunci 'var'
        var nama = "Politeknik Negeri Medan";
        var url = "https://polmed.ac.id/";
        var jumlahMhs = 7420;
        var akreditasi = true;

        // alert() memunculkan pop-up pesan di browser saat halaman dimuat
        alert("Selamat Datang di " + nama);

        // Menggabungkan teks dan variabel menggunakan tanda +
        document.write("Nama Institusi : " + nama + "<br>");
        document.write("Alamat URL : " + url + "<br>");
        document.write("Jumlah Mahasiswa : " + jumlahMhs + "<br>");
        document.write("Terakreditasi : " + akreditasi + "<br>");
    </script>
</body>
</html>
