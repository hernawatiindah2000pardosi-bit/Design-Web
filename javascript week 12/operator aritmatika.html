<!DOCTYPE html>
<html>
<head>
    <title>Operator Aritmatika</title>
</head>
<body>
    <script>
        var a = 10;
        var b = 5;
        var c = 0; // Variabel penampung hasil

        // pengurangan
        c = a - b;
        document.write(a + " - " + b + " = " + c + "<br/>");

        // Perkalian (menggunakan simbol bintang *)
        c = a * b;
        document.write(a + " * " + b + " = " + c + "<br/>");

        // pemangkatan (menggunakan bintang dua **)
        c = a ** b;
        document.write(a + " ** " + b + " = " + c + "<br/>");

        // Pembagian (menggunakan garis miring /)
        c = a / b;
        document.write(a + " / " + b + " = " + c + "<br/>");

        // Modulo (sisa bagi, menggunakan simbol %)
        c = a % b;
        document.write(a + " % " + b + " = " + c + "<br/>");
    </script>
</body>
</html>
