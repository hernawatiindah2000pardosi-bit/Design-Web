<!DOCTYPE html>
<html>
<head>
    <title>Operator Penugasan</title>
</head>
<body>
    <script>
        document.write("Kecepatan Awal...<br>");
        
        // pengisian nilai awal menggunakan operator =
        var kecepatan = 20;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan menjumlahan dengan 5
        kecepatan += 5;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan pengurangan dengan 2
        kecepatan -= 2;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan perkalian dengan 2
        kecepatan *= 2;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan pembagian dengan 4
        kecepatan /= 4;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan pemangkatan dengan 1
        kecepatan **= 1;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");

        // pengisian dan modulo dengan 3
        kecepatan %= 3;
        document.write("kecepatan = "+ kecepatan + " km/h <br/>");
    </script>
</body>
</html>
