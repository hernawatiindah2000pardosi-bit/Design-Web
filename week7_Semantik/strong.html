<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- strong: kepentingan/urgensi -->
    <p><strong>Peringatan:</strong> Data Anda akan dihapus secara permanen!</p>
    <!-- em: penekanan/stres dalam kalimat -->
    <p>Saya <em>tidak pernah</em> mengatakan itu.</p>
    <!-- mark: menyoroti teks relevan -->
    <p>Hasil pencarian untuk "<mark>semantic html</mark>":</p>
    <!-- abbr: singkatan -->
    <p><abbr title="Hypertext Markup Language">HTML</abbr> adalah fondasi web.</p>
    <!-- cite: menyebutkan karya/sumber -->
    <p>Seperti disebutkan dalam <cite>Clean Code</cite> oleh Robert C.Martin...</p>
    <!-- blockquote: kutipan panjang -->
    <blockquote cite="https://www.w3.org/">
        <p>The Web is for everyone.</p>
    <footer>-<cite>W3C Mission Statement</cite></footer>
    </blockquote>
</body>
</html>
